<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f09433;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#e6683c;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#dc2743;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#cc2366;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bc1888;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#grad2)" />
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="80" fill="rgba(255,255,255,0.1)" />
  <!-- Letter A stylized -->
  <text x="100" y="125" font-family="Georgia, serif" font-size="90" font-weight="bold" text-anchor="middle" fill="white" opacity="0.95">A</text>
  <!-- Small star decoration -->
  <text x="148" y="68" font-size="22" text-anchor="middle" fill="white">✦</text>
  <text x="52" y="145" font-size="14" text-anchor="middle" fill="rgba(255,255,255,0.7)">✦</text>
</svg>
