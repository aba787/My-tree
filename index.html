
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ada_77 | Links</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Profile Section -->
        <div class="profile">
            <div class="avatar">
                <img src="https://via.placeholder.com/120/4a90e2/ffffff?text=A" alt="Ada_77" id="profile-img">
            </div>
            <h1 class="username">@Ada_77</h1>
            <p class="bio">Welcome to my digital space ✨</p>
        </div>

        <!-- Links Section -->
        <div class="links">
            <a href="#" class="link-item" data-link="instagram">
                <i class="fab fa-instagram"></i>
                <span>Instagram</span>
                <i class="fas fa-external-link-alt"></i>
            </a>

            <a href="#" class="link-item" data-link="tiktok">
                <i class="fab fa-tiktok"></i>
                <span>TikTok</span>
                <i class="fas fa-external-link-alt"></i>
            </a>

            <a href="#" class="link-item" data-link="youtube">
                <i class="fab fa-youtube"></i>
                <span>YouTube</span>
                <i class="fas fa-external-link-alt"></i>
            </a>

            <a href="#" class="link-item" data-link="twitter">
                <i class="fab fa-twitter"></i>
                <span>Twitter</span>
                <i class="fas fa-external-link-alt"></i>
            </a>

            <a href="#" class="link-item" data-link="website">
                <i class="fas fa-globe"></i>
                <span>My Website</span>
                <i class="fas fa-external-link-alt"></i>
            </a>

            <a href="#" class="link-item" data-link="email">
                <i class="fas fa-envelope"></i>
                <span>Contact Me</span>
                <i class="fas fa-external-link-alt"></i>
            </a>

            <a href="#" class="link-item" data-link="shop">
                <i class="fas fa-shopping-bag"></i>
                <span>Shop</span>
                <i class="fas fa-external-link-alt"></i>
            </a>

            <a href="#" class="link-item" data-link="github">
                <i class="fab fa-github"></i>
                <span>GitHub</span>
                <i class="fas fa-external-link-alt"></i>
            </a>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>Made with ❤️ on Replit</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
